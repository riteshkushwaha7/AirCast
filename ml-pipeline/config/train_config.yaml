model:
  name: aqi_lstm
  version: v0.1.0
  sequence_length: 48
  forecast_horizons_hours: [4, 6, 12, 24]

training:
  epochs: 12
  batch_size: 32
  learning_rate: 0.001
  validation_split: 0.2

paths:
  raw_data: data/raw
  processed_data: data/processed
  registry: models/registry

features:
  include_rolling_avg: true
  include_time_features: true
  include_weekday_hour: true
