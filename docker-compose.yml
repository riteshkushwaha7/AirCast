services:
  postgres:
    image: postgres:16
    container_name: airwise-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airwise}
      POSTGRES_USER: ${POSTGRES_USER:-airwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airwise123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed/postgres_seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airwise} -d ${POSTGRES_DB:-airwise}"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    container_name: airwise-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${INFLUXDB_INIT_MODE:-setup}
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME:-airwise}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:-airwise123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG:-airwise}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET:-airwise_timeseries}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN:-dev-influx-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: airwise-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      POSTGRES_URI: ${POSTGRES_URI:-postgresql+psycopg2://airwise:airwise123@postgres:5432/airwise}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-influx-token}
      INFLUX_ORG: ${INFLUX_ORG:-airwise}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-airwise_timeseries}
      ALLOW_MOCK_AUTH: ${ALLOW_MOCK_AUTH:-true}
      SOURCE_MOCK_MODE: ${SOURCE_MOCK_MODE:-true}
      LIVE_AQI_PROVIDER: ${LIVE_AQI_PROVIDER:-cpcb}
      LIVE_AQI_BASE_URL: ${LIVE_AQI_BASE_URL:-https://api.data.gov.in/resource/placeholder-cpcb-aqi}
      LIVE_AQI_API_KEY: ${LIVE_AQI_API_KEY:-}
      LIVE_AQI_TIMEOUT: ${LIVE_AQI_TIMEOUT:-20}
      LIVE_AQI_DEFAULT_LIMIT: ${LIVE_AQI_DEFAULT_LIMIT:-1000}
      FCM_ENABLED: ${FCM_ENABLED:-false}
      FCM_DRY_RUN: ${FCM_DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/admin/health', timeout=3)\""
        ]
      interval: 20s
      timeout: 5s
      retries: 8

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: airwise-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_ENABLE_MOCK_FALLBACK: ${NEXT_PUBLIC_ENABLE_MOCK_FALLBACK:-true}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 8

  ml-pipeline:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    container_name: airwise-ml
    profiles: ["ml"]
    environment:
      POSTGRES_URI: ${POSTGRES_URI:-postgresql+psycopg2://airwise:airwise123@postgres:5432/airwise}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-influx-token}
      INFLUX_ORG: ${INFLUX_ORG:-airwise}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-airwise_timeseries}
      SOURCE_MOCK_MODE: ${SOURCE_MOCK_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    command: ["python", "ingestion/run_ingestion.py", "--city", "Delhi", "--limit", "100"]

volumes:
  postgres_data:
  influxdb_data:
